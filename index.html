<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#FDF4E3">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Reels Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1 id="header-title">Reels Planner</h1>
    </header>

    <main>
      <section id="screen-home" class="screen active">
        <div class="welcome-banner">
          <h2>🎬 Готовы снять Reels?</h2>
          <p id="daily-quote"></p>
        </div>
        <div id="trends-container" class="trends-section" style="display:none">
          <div class="trends-header">
            <span class="trends-icon">📈</span>
            <h3>Еженедельные тренды от AI</h3>
          </div>
          <div class="trends-list" id="trends-list"></div>
        </div>
        <div id="ideas-container"></div>
        <button id="btn-refresh" class="btn-outline" type="button" style="display:none">Не нравится — ещё 4</button>
        <button id="btn-back-home" class="btn-outline" type="button" style="display:none">← Назад</button>
        <button id="btn-generate" class="btn-main" type="button">Получить идеи</button>
      </section>

      <section id="screen-history" class="screen">
        <div id="history-filters">
          <button class="filter-btn active" type="button" data-filter="planned">Запланировано</button>
          <button class="filter-btn" type="button" data-filter="completed">Снято</button>
          <button class="filter-btn" type="button" data-filter="skipped">Пропущено</button>
        </div>
        <div id="history-list">
          <div class="empty-state"><p>Пока пусто</p></div>
        </div>
      </section>

      <section id="screen-stats" class="screen">
        <div id="stats-content">
          <div class="stat-card"><div class="stat-number">0</div><div class="stat-label">Всего идей</div></div>
          <div class="stat-card"><div class="stat-number">0</div><div class="stat-label">Запланировано</div></div>
          <div class="stat-card"><div class="stat-number">0</div><div class="stat-label">Снято</div></div>
          <div class="stat-card"><div class="stat-number">0</div><div class="stat-label">Пропущено</div></div>
          <div class="stat-card"><div class="stat-number">0</div><div class="stat-label">Дней подряд</div></div>
        </div>
      </section>

      <section id="screen-settings" class="screen">
        <form id="settings-form">
          <div class="form-group">
            <label for="setting-profile">О себе (для AI)</label>
            <textarea id="setting-profile" placeholder="Кто вы, что снимаете, какая ниша..."></textarea>
          </div>
          <div class="form-group">
            <label>Дни съёмок</label>
            <div id="day-picker" class="day-picker">
              <button type="button" class="day-btn" data-day="1">Пн</button>
              <button type="button" class="day-btn" data-day="2">Вт</button>
              <button type="button" class="day-btn" data-day="3">Ср</button>
              <button type="button" class="day-btn" data-day="4">Чт</button>
              <button type="button" class="day-btn" data-day="5">Пт</button>
              <button type="button" class="day-btn" data-day="6">Сб</button>
              <button type="button" class="day-btn" data-day="0">Вс</button>
            </div>
          </div>
          <div class="form-group">
            <label>Время напоминания (МСК)</label>
            <input type="time" id="setting-time" value="10:00" class="time-input">
          </div>
          <div class="form-group">
            <label for="setting-ai-provider">AI API</label>
            <select id="setting-ai-provider">
              <option value="none">Без AI (база идей)</option>
              <option value="groq">Groq (бесплатно)</option>
              <option value="gemini">Google Gemini</option>
              <option value="openai">OpenAI</option>
              <option value="claude">Claude (Anthropic)</option>
            </select>
            <input type="password" id="setting-api-key" placeholder="API ключ" class="hidden">
          </div>
          <button type="submit" class="btn-main">Сохранить</button>
          <button type="button" id="btn-test-bot" class="btn-outline" style="margin-top:8px">Тест бота</button>
        </form>
      </section>
    </main>

    <nav id="tab-bar">
      <button class="tab active" type="button" data-screen="home">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Идеи</span>
      </button>
      <button class="tab" type="button" data-screen="history">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>История</span>
      </button>
      <button class="tab" type="button" data-screen="stats">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        <span>Статистика</span>
      </button>
      <button class="tab" type="button" data-screen="settings">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>Настройки</span>
      </button>
    </nav>
  </div>

  <script src="config.js"></script>
  <script src="ideas.js"></script>
  <script src="api.js"></script>
  <script src="telegram.js"></script>
  <script src="app.js"></script>
</body>
</html>
